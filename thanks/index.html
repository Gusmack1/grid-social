<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks! | Grid Social</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --dark: #0F172A; --blue: #2563EB; --blue-l: #3B82F6; --white: #FFFFFF; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; background-image: linear-gradient(rgba(37,99,235,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.08) 1px, transparent 1px); background-size: 44px 44px; }
    .check { width: 80px; height: 80px; background: rgba(5,150,105,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -0.03em; }
    p { color: rgba(255,255,255,0.6); font-size: 1.1rem; max-width: 480px; margin-bottom: 2rem; }
    a { background: var(--blue); color: var(--white); padding: 0.85rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 700; transition: background 0.2s; }
    a:hover { background: var(--blue-l); }
    .logo { position: absolute; top: 2rem; left: 2rem; font-size: 1.2rem; font-weight: 700; }
    .logo span { color: var(--blue-l); }
  </style>
</head>
<body>
  <div class="logo">Grid<span>Social</span></div>
  <div class="check">✅</div>
  <h1>Thanks for getting in touch!</h1>
  <p>We've received your message and will get back to you within 24 hours. In the meantime, check out our blog for free marketing tips.</p>
  <a href="/blog/">Read our blog →</a>
</body>
</html>
