[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# www redirect
[[redirects]]
  from = "https://www.gridsocial.co.uk/*"
  to = "https://gridsocial.co.uk/:splat"
  status = 301
  force = true

# Dashboard redirect — sends users to auto-poster app
[[redirects]]
  from = "/manage"
  to = "https://grid-social-autoposter.netlify.app/"
  status = 301
  force = true

[[redirects]]
  from = "/manage/"
  to = "https://grid-social-autoposter.netlify.app/"
  status = 301
  force = true

[[redirects]]
  from = "/manage/*"
  to = "https://grid-social-autoposter.netlify.app/:splat"
  status = 301
  force = true
